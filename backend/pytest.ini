[pytest]
testpaths = tests edon_gateway/test
python_files = test_*.py *_sim.py *_cases.py *_runtime.py *_replay.py *_bundle.py *_injector.py long_horizon.py
markers =
    live_server: marks tests that require a running gateway (deselected in CI)
    integration: marks tests that use real components (no mocks)
asyncio_default_fixture_loop_scope = function
