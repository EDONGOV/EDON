# Use: fly deploy -c fly.edon-gatewaybk.toml  (or set app in fly.toml when deploying edon-gatewaybk)
app = "edon-gatewaybk"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[env]
  EDON_HOST = "0.0.0.0"
  EDON_PORT = "8080"
  PYTHONPATH = "/app"
  # Set to true only during initial bootstrap; flip to false for production lock-down
  EDON_ALLOW_ENV_TOKEN_IN_PROD = "false"
  # Multiple workers so concurrent requests don't queue (was 1 → p99 ~8s under load).
  EDON_WORKERS = "8"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = true
  min_machines_running = 2
  processes = ["app"]

  # Give the app time to start (imports, DB, bind) before Fly runs the first check
  [[http_service.checks]]
  grace_period = "30s"
  interval = "15s"
  timeout = "10s"
  method = "GET"
  path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
