# Alembic configuration for EDON Gateway
# Run migrations: cd backend && alembic upgrade head
# Create new migration: alembic revision --autogenerate -m "description"
# Set PostgreSQL URL: EDON_DB_URL=postgresql://user:pass@host/dbname alembic upgrade head

[alembic]
script_location = edon_gateway/migrations
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40
prepend_sys_path = .

# sqlalchemy.url is overridden in env.py via EDON_DB_URL env var.
# This placeholder satisfies the alembic config parser.
sqlalchemy.url = sqlite:///edon_gateway.db

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
