name: Security Monitor

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

jobs:
  scan:
    name: Hourly security scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.gateway.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.gateway.txt anthropic

      - name: Run security monitor
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EDON_API_TOKEN: ${{ secrets.EDON_API_TOKEN }}
          EDON_GATEWAY_URL: ${{ secrets.EDON_GATEWAY_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          INCIDENT_WEBHOOK_URL: ${{ secrets.INCIDENT_WEBHOOK_URL }}
          EDON_ADMIN_TENANT_ID: ${{ secrets.EDON_ADMIN_TENANT_ID || 'tenant_dev' }}
        run: python -m agents.security_monitor_agent
