name: Dependency Graph

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  dependency-graph:
    name: Submit dependency graph snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Submit dependency graph snapshot
        uses: advanced-security/component-detection-dependency-submission-action@v0.1.0
        with:
          correlator: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.run_id }}
