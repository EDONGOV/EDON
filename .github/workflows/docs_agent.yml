name: Docs Agent

on:
  push:
    branches: [master, main]
    paths:
      - "backend/edon_gateway/**"

jobs:
  update-docs:
    name: Sync API docs
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need HEAD~1 for diff

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.gateway.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.gateway.txt anthropic

      - name: Get diff of changed gateway files
        run: |
          git diff HEAD~1 HEAD -- 'backend/edon_gateway/**' > /tmp/edon_diff.txt
          echo "Diff size: $(wc -c < /tmp/edon_diff.txt) bytes"

      - name: Run docs agent
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Large diffs must be read from a file — env vars exceed Linux ARG_MAX
          EDON_GIT_DIFF_FILE: /tmp/edon_diff.txt
        run: python -m agents.docs_agent

      - name: Check for doc changes
        id: changes
        run: |
          if git diff --quiet docs/api-reference.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Open PR with updated docs
        if: steps.changes.outputs.changed == 'true'
        run: |
          BRANCH="docs-agent/api-ref-${{ github.run_number }}"
          git config user.name "EDON Docs Agent"
          git config user.email "noreply@edoncore.com"
          git checkout -b "$BRANCH"
          git add docs/api-reference.md
          git commit -m "docs: sync api-reference.md with gateway changes [automated]"
          git push origin "$BRANCH"
          gh pr create \
            --title "docs: sync API reference with latest gateway changes" \
            --body "Auto-generated by the EDON Docs Agent after changes to \`backend/edon_gateway/\`.\n\nReview the diff and merge if accurate." \
            --label "documentation,automated" \
            --base master \
            --head "$BRANCH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
