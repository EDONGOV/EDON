name: Regulatory Watcher

on:
  schedule:
    - cron: "0 6 * * 1"   # Monday 6am UTC every week
  workflow_dispatch:       # manual run from GitHub UI

jobs:
  watch:
    name: Scan for regulatory changes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.gateway.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.gateway.txt anthropic

      - name: Run regulatory watcher
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python -m agents.regulatory_watcher
