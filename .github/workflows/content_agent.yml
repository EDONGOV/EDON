name: Content Agent (Weekly)

on:
  schedule:
    - cron: "0 9 * * 2"   # Tuesday 9am UTC — post goes live mid-week
  workflow_dispatch:

jobs:
  write-post:
    name: Write next blog post
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.gateway.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.gateway.txt anthropic

      - name: Write blog post
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m agents.content_agent

      - name: Open PR with new post
        run: |
          BRANCH="content-agent/post-${{ github.run_number }}"
          git config user.name "EDON Content Agent"
          git config user.email "noreply@edoncore.com"
          git checkout -b "$BRANCH"
          git add content/ backend/agents/content_topics.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "content: add new blog post [automated]"
          git push origin "$BRANCH"
          gh pr create \
            --title "content: new blog post from content agent" \
            --body "Auto-generated by the EDON Content Agent.\n\nReview for accuracy — especially regulation citations — before merging and publishing." \
            --label "content,automated" \
            --base master \
            --head "$BRANCH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
