name: Chief of Staff (Daily Brief)

on:
  schedule:
    - cron: "30 7 * * *"   # 7:30am UTC every day
  workflow_dispatch:

jobs:
  brief:
    name: Generate daily brief
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.gateway.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.gateway.txt anthropic

      - name: Run Chief of Staff
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EDON_API_TOKEN: ${{ secrets.EDON_API_TOKEN }}
          EDON_GATEWAY_URL: ${{ secrets.EDON_GATEWAY_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          BRIEFING_WEBHOOK_URL: ${{ secrets.BRIEFING_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EDON_ADMIN_TENANT_ID: ${{ secrets.EDON_ADMIN_TENANT_ID || 'tenant_prod' }}
        run: python -m agents.chief_of_staff

      - name: Upload brief
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-brief-${{ github.run_number }}
          path: backend/agents/daily_brief_latest.json
          retention-days: 30
