name: Secret Audit

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve audit base
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            echo "SECRET_AUDIT_BASE_REF=$(git merge-base HEAD origin/${{ github.base_ref }})" >> "$GITHUB_ENV"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "SECRET_AUDIT_BASE_REF=${{ github.event.before }}" >> "$GITHUB_ENV"
          fi

      - name: Run secret audit
        run: python backend/scripts/secret_audit.py
