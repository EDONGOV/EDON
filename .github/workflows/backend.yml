name: Backend CI/CD

on:
  push:
    branches: [master, main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.gateway.txt

      - name: Install dependencies
        run: pip install -r requirements.gateway.txt pytest pytest-asyncio httpx anyio

      - name: Run tests
        run: pytest -q -W ignore::DeprecationWarning
        env:
          PYTHONPATH: .
          EDON_ENV: development
          EDON_AUTH_ENABLED: "false"
          EDON_CREDENTIALS_STRICT: "false"
          EDON_STRICT_FAIL_CLOSED: "false"

      - name: Governance benchmark (safety gate)
        run: |
          pytest edon_gateway/test/benchmark/ \
            -k "not load" \
            -q -W ignore::DeprecationWarning \
            --tb=short
        env:
          PYTHONPATH: .
          EDON_ENV: development
          EDON_AUTH_ENABLED: "false"
          EDON_CREDENTIALS_STRICT: "false"
          EDON_STRICT_FAIL_CLOSED: "false"

  deploy-staging:
    name: Deploy to Fly.io Staging
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'  # staging deploy only from main
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Fly CLI
        run: curl -L https://fly.io/install.sh | sh && echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Authenticate Fly (Staging)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_STAGING_DEPLOY_TOKEN }}
        run: flyctl auth login --access-token $FLY_API_TOKEN

      - name: Verify Fly auth (Staging)
        run: flyctl status --app edon

      - name: Deploy to Staging
        run: flyctl deploy --remote-only --app edon
        working-directory: backend

  deploy-prod:
    name: Deploy to Fly.io Production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'  # deploy prod from master/main
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Fly CLI
        run: curl -L https://fly.io/install.sh | sh && echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Authenticate Fly (Prod)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_PROD_DEPLOY_TOKEN }}
        run: flyctl auth login --access-token $FLY_API_TOKEN

      - name: Verify Fly auth (Prod)
        run: flyctl status --app edon-gateway-prod

      - name: Deploy to Production
        run: flyctl deploy --remote-only --app edon-gateway-prod
        working-directory: backend