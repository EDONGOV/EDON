name: Integration Agent (Weekly)

on:
  schedule:
    - cron: "0 11 * * 3"   # Wednesday 11am UTC
  workflow_dispatch:

jobs:
  integrate:
    name: Ecosystem scan + SDK examples
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.gateway.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.gateway.txt anthropic

      - name: Run integration agent
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EDON_API_TOKEN: ${{ secrets.EDON_API_TOKEN }}
          EDON_GATEWAY_URL: ${{ secrets.EDON_GATEWAY_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          EDON_ADMIN_TENANT_ID: ${{ secrets.EDON_ADMIN_TENANT_ID || 'tenant_dev' }}
        run: python -m agents.integration_agent

      - name: Open PR if new SDK examples were generated
        run: |
          if git diff --quiet sdk/examples/; then
            echo "No new SDK examples generated"
            exit 0
          fi
          BRANCH="integration-agent/sdk-examples-${{ github.run_number }}"
          git config user.name "EDON Integration Agent"
          git config user.email "noreply@edoncore.com"
          git checkout -b "$BRANCH"
          git add sdk/examples/
          git commit -m "sdk: add auto-generated examples from integration agent [automated]"
          git push origin "$BRANCH"
          gh pr create \
            --title "sdk: new code examples from integration agent" \
            --body "Auto-generated SDK examples based on top customer usage patterns.\n\nReview for correctness before merging." \
            --label "sdk,automated" \
            --base master \
            --head "$BRANCH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
