name: Product Intelligence (Weekly)

on:
  schedule:
    - cron: "0 10 * * 4"   # Thursday 10am UTC — read before your Friday planning
  workflow_dispatch:

jobs:
  analyse:
    name: Weekly product intelligence
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.gateway.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.gateway.txt anthropic

      - name: Run product intelligence agent
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EDON_API_TOKEN: ${{ secrets.EDON_API_TOKEN }}
          EDON_GATEWAY_URL: ${{ secrets.EDON_GATEWAY_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          EDON_ADMIN_TENANT_ID: ${{ secrets.EDON_ADMIN_TENANT_ID || 'tenant_dev' }}
        run: python -m agents.product_intelligence_agent

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-intelligence-${{ github.run_number }}
          path: backend/agents/product_intelligence_report.json
          retention-days: 90
