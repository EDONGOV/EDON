name: Nightly QA Agent

on:
  schedule:
    - cron: "0 3 * * *"   # 3am UTC every night
  workflow_dispatch:       # allow manual runs from GitHub UI

jobs:
  qa:
    name: Clinical Safety Regression
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.gateway.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.gateway.txt anthropic

      - name: Run QA agent
        working-directory: backend
        env:
          EDON_API_TOKEN: ${{ secrets.EDON_API_TOKEN }}
          EDON_GATEWAY_URL: ${{ secrets.EDON_GATEWAY_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          EDON_QA_TENANT_ID: ${{ secrets.EDON_QA_TENANT_ID || 'tenant_dev' }}
        run: python -m agents.qa_agent

      - name: Upload QA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report-${{ github.run_number }}
          path: backend/agents/qa_report.json
          retention-days: 30
