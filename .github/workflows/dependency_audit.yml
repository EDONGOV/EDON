name: Dependency Audit

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit npm roots
        shell: bash
        run: |
          set -euo pipefail
          roots=(
            "EdonLP"
            "admin"
            "console"
            "demos/admin-demo"
            "demos/healthcare-demo"
            "demos/logistics"
            "demos/law"
            "frontend"
            "sdk/javascript"
          )
          for root in "${roots[@]}"; do
            if [ -f "$root/package.json" ]; then
              echo "Auditing $root"
              npm audit --prefix "$root" --audit-level=high
            fi
          done

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit Python requirements
        run: |
          pip-audit -r backend/requirements.gateway.txt
          pip-audit -r load_tests/requirements.txt
