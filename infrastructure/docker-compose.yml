# EDON Full Stack — local dev
# Usage: docker compose up --build
# Frontend: http://localhost:8080   Backend: http://localhost:8000

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    env_file:
      - ../backend/.env
    environment:
      - EDON_HOST=0.0.0.0
      - EDON_PORT=8080
      - PYTHONPATH=/app
      - EDON_CORS_ORIGINS=http://localhost:8080
    volumes:
      - gateway_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 3

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
      - /app/node_modules
    ports:
      - "8080:8080"
    environment:
      - VITE_EDON_GATEWAY_URL=http://backend:8080
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8080"
    depends_on:
      - backend

volumes:
  gateway_data:
